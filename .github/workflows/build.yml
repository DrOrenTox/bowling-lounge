name: Build Geode Mod

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: [Win32, Mac, Android32, Android64]

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.target == 'Win32' && 'windows-latest' || matrix.target == 'Mac' && 'macos-latest' || 'ubuntu-latest' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.target }}
