name: Build Geode Mod

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
          - name: Android32
            os: ubuntu-latest
            target: Android32
          - name: Android64
            os: ubuntu-latest
            target: Android64
          - name: macOS
            os: macos-latest
            target: Mac

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This fixes the deep internal 7z conflict by removing any pre-existing tool states
      - name: Clean Runner Workspace Completely
        run: |
          rm -rf my-epic-geode-cli
          rm -rf D:/a/bowling-lounge/bowling-lounge/my-epic-geode-cli
        shell: bash
        continue-on-error: true

      # Setting up environment caches for CMake
      - name: Setup Build Environment
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.config.target }}-v2

      # FIX: We change the target path or clean it so the action doesn't double-extract into conflicts
      - name: Setup Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main
        with:
          # If the setup action supports changing the directory or forcing overwrite, we handle it here.
          # Since it crashes on duplicates, we clear the env cache key above by changing it to v2.
          # This forces a fresh run where duplicate zips don't exist in the cache.
          
      # Compiles your C++ and CMake project files
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}

  package:
    name: Package Mod
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Merge Platform Builds
        uses: geode-sdk/build-geode-mod/combine@main
