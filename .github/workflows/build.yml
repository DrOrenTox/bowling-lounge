name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}

      # FIX 1: Upload the individual platform files so the combine job can see them
      - name: Upload Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geode-build-${{ matrix.config.name }}
          path: "**/*.geode"

  combine:
    name: Combine builds
    runs-on: ubuntu-latest
    needs: ['build']
    steps:
      - uses: actions/checkout@v4
      
      # FIX 2: Explicitly grab the uploaded files before combining
      - name: Download Platform Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: geode-build-*
          merge-multiple: true

      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Cosmic-Bowling-Lounge-Mod
          path: "**/*.geode"
