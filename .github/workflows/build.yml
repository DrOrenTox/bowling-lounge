name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}

      # FIX 1: Explicitly target the root directory where Geode v5 saves the output file
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geode-build-${{ matrix.config.name }}
          path: ./*.geode

  combine:
    name: Combine builds
    runs-on: ubuntu-latest
    needs: ['build']
    steps:
      - uses: actions/checkout@v4
      
      - name: Download All Platform Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: geode-build-*
          path: artifacts
      
      # FIX 2: Better debugging and flat flattening to verify the downloads
      - name: Organize artifacts
        run: |
          mkdir -p out
          echo "=== Scanning Downloaded Artifacts ==="
          find artifacts -type f
          echo "=== Copying packages to merging directory ==="
          find artifacts -name "*.geode" -exec cp {} out/ \;
          echo "=== Verifying Target Directory Contents ==="
          ls -la out/

      - uses: geode-sdk/build-geode-mod/combine@main
        id: build
        with:
          build-folder: out

      # FIX 3: Accurately grabs the completed multi-platform bundle output
      - name: Upload Combined Package
        uses: actions/upload-artifact@v4
        with:
          name: Cosmic-Bowling-Lounge-Mod
          path: ${{ steps.build.outputs.build-output }}

