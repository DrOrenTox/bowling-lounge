name: Build Geode Mod
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Geode CLI and SDK
        run: |
          curl -L "https://github.com" -o geode-cli.zip
          unzip geode-cli.zip -d geode-bin
          chmod +x geode-bin/geode
          sudo mv geode-bin/geode /usr/local/bin/geode
          geode sdk install
          echo "GEODE_SDK=$HOME/.geode/sdk" >> $GITHUB_ENV

      - name: Build Mod with CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DGEODE_SDK=$GEODE_SDK
          cmake --build build --config Release

