name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          # Windows Targets
          - name: Windows 64-bit
            os: windows-latest
            target: Win64
          - name: Windows 32-bit
            os: windows-latest
            target: Win32

          # Android Targets
          - name: Android 64-bit
            os: ubuntu-latest
            target: Android64
          - name: Android 32-bit
            os: ubuntu-latest
            target: Android32

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      # FIXED: Provisions the required NDK compiler tools so the Linux runner can generate Android binaries
      - name: Set up Android NDK
        if: contains(matrix.config.target, 'Android')
        uses: nndm/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']
    steps:
      - uses: actions/checkout@v4

      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Cosmic-Bowling-Lounge-Mod
          path: ${{ steps.build.outputs.build-output }}

